UI menu.c32
MENU TITLE XiaoyangOS
MENU BACKGROUND splash.png
TIMEOUT 50
DEFAULT xiaoyangos

LABEL xiaoyangos
  MENU LABEL ^Boot XiaoyangOS
  LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
  INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archiso_rd_efi_wrapper=1

LABEL xiaoyangos-nofb
  MENU LABEL Boot XiaoyangOS (nomodeset)
  LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
  INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% nomodeset

LABEL xiaoyangos-xfailsafe
  MENU LABEL Boot XiaoyangOS (failsafe)
  LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
  INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% nomodeset xf86-video.intel Xorg_Output=LVDS-1

LABEL memtest
  MENU LABEL Run MemTest86+ (RAM test)
  LINUX ../%INSTALL_DIR%/boot/memtest86+/memtest.bin

LABEL hwdetect
  MENU LABEL Hardware Detection
  LINUX ../%INSTALL_DIR%/boot/vmlinuz-linux
  INITRD ../%INSTALL_DIR%/boot/intel-ucode.img,../%INSTALL_DIR%/boot/amd-ucode.img,../%INSTALL_DIR%/boot/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% hwdetect
