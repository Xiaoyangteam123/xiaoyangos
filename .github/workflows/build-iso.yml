name: Build XiaoyangOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso grub syslinux github-cli jq

      - name: Build XiaoyangOS ISO
        env:
          PACMAN: pacman --noconfirm
        run: |
          mkdir -p /tmp/work /tmp/out
          mkarchiso -v -w /tmp/work -o /tmp/out ./archlive
          cp /tmp/out/*.iso ./
          ls -lh *.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: XiaoyangOS-ISO
          path: ./*.iso
          compression-level: 0

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="xiaoyangos-$(date +%Y.%m.%d)"
          echo "Creating release $TAG..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"XiaoyangOS $(date +%Y.%m.%d)\",\"body\":\"XiaoyangOS - Custom Arch Linux distribution with KDE Plasma.\\nDefault user: liveuser, password: xiaoyangos.\\n\\nISO 鏂囦欢澶у皬: $(ls -lh *.iso | awk '{print $5}')\"}" > release.json
          cat release.json
          # Upload ISO as release asset
          UPLOAD_URL=$(jq -r '.upload_url' release.json | sed 's/{?name,label}//')
          echo "Upload URL: $UPLOAD_URL"
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "$UPLOAD_URL?name=$(ls *.iso)" \
            --data-binary @$(ls *.iso) > upload.json
          cat upload.json
